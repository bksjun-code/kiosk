<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>빽다방 주문 관리</title>
<link rel="stylesheet" href="/static/css/fig-tokens.css">
<link rel="stylesheet" href="/static/css/typography.css">
<link rel="stylesheet" href="/static/css/spacing.css">
<link rel="stylesheet" href="/static/css/materials.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="/static/js/ds-bundle.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--backgrounds-grouped-primary, #EBEBEF);
    font-family: var(--font-system, -apple-system, BlinkMacSystemFont, "SF Pro", "Helvetica Neue", sans-serif);
    min-height: 100vh;
  }
  #app-root { min-height: 100vh; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.18); border-radius: 4px; }
  /* 주문 목록 + 상세 패널: 좁은 화면에서는 2열이 찌그러지므로 1열로 쌓는다. */
  .admin-master-detail-grid { display: grid; grid-template-columns: minmax(320px, 420px) 1fr; gap: 16px; align-items: flex-start; }
  @media (max-width: 780px) {
    .admin-master-detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app-root"></div>
<script type="text/babel" src="/static/js/admin-nav.js"></script>
<script type="text/babel" src="/static/js/admin.js"></script>
</body>
</html>
